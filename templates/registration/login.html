{% extends 'base.html' %}
{% block title %}Ingresar{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-md-5">
    <h2 class="mb-3">Iniciar sesión</h2>
    <form method="post" class="card card-body shadow-sm">
      {% csrf_token %}
      {{ form.as_p }}
      <button type="submit" class="btn btn-primary">Ingresar</button>
    </form>
  </div>
</div>
{% endblock %}
