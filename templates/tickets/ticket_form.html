{% extends 'base.html' %}
{% block title %}Nuevo ticket{% endblock %}
{% block content %}
<h2>Nuevo ticket</h2>
<form method="post" enctype="multipart/form-data" class="card card-body shadow-sm">
  {% csrf_token %}
  {{ form.as_p }}

</form>
{% endblock %}
